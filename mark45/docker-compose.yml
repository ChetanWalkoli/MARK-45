version: '3.8'

services:
  # Qdrant Vector Database (Ready for Phase 2 Memory RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mark45_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

volumes:
  qdrant_storage:
